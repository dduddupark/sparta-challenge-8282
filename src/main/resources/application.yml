spring:
  application:
    name: sparta-challenge-8282

  datasource:
    url: jdbc:postgresql://localhost:5432/delivery
    username: delivery
    password: delivery
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

jwt:
  # 최소 32자 이상의 비밀키 (운영 환경에서는 환경변수로 주입)
  secret: sparta-orderfront-secret-key-must-be-at-least-32-characters
  expiration-ms: 3600000   # 1시간 (ms)