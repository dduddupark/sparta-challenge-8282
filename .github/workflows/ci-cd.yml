name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # 1단계: 빌드 + 테스트 (main·develop·PR 공통)
  build:
    runs-on: ubuntu-latest

    # 테스트(@SpringBootTest)가 컨텍스트 로딩 시 DB 연결을 시도하므로
    # application.yml 과 동일한 값으로 PostgreSQL 서비스를 띄운다.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: delivery
          POSTGRES_USER: delivery
          POSTGRES_PASSWORD: delivery
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build & Test
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: ./gradlew build

  # 2단계: EC2 배포 (main push 이고, build 통과했을 때만)
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~
            if [ ! -d sparta-challenge-8282 ]; then
              git clone https://github.com/dduddupark/sparta-challenge-8282.git
            fi
            cd sparta-challenge-8282
            git pull origin main
            export DB_NAME='${{ secrets.DB_NAME }}'
            export DB_USERNAME='${{ secrets.DB_USERNAME }}'
            export DB_PASSWORD='${{ secrets.DB_PASSWORD }}'
            docker compose up -d --build
            docker image prune -f
            # 헬스체크: 앱이 실제로 기동해 8080에 응답하는지 확인 (실패 시 배포 실패 처리)
            echo "Waiting for app to become healthy on :8080 ..."
            for i in $(seq 1 30); do
              if curl -fsS http://localhost:8080/actuator/health >/dev/null 2>&1; then
                echo "App is up (attempt $i)"
                exit 0
              fi
              sleep 5
            done
            echo "App did not respond on :8080 after 150s"
            docker compose logs --tail=50 app
            exit 1
